<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pytml - Demo</title>
    <script src="https://pytml.vercel.app/pytml.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            margin: 0 0 10px 0;
            color: white;
        }
        
        p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Pytml Demo</h1>
            <p>All inputs and output are some script.py</p>
        </div>
    </div>
    
    <script type="text/python" src="script.py"></script>
</body>
</html>
