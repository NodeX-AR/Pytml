name: Update CDN Cache

on:
  # Automatically run when pushing to main branch
  push:
    branches: [main]
    paths:
      - 'pytml.js'
      - 'pytml.min.js'
  
  # Manually trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual update'
        required: false
        default: 'Manual cache purge'
        type: string

jobs:
  purge-cdn:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Display manual trigger info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual trigger by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
      
      - name: Purge jsDelivr cache (main)
        run: |
          curl -X PURGE https://cdn.jsdelivr.net/gh/NodeX-AR/Pytml/pytml.min.js
          curl -X PURGE https://cdn.jsdelivr.net/gh/NodeX-AR/Pytml@latest/pytml.min.js
          echo "Cache purge requested"
      
      - name: Wait for cache to clear
        run: sleep 10
      
      - name: Verify cache purge
        run: |
          curl -I https://cdn.jsdelivr.net/gh/NodeX-AR/Pytml@latest/pytml.min.js
      
      - name: Send notification (optional)
        if: success()
        run: |
          echo "✅ CDN cache purged successfully"
